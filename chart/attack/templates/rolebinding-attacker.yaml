apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: attacker-pod-reader
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "attack.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: attacker-pod-reader
subjects:
  - kind: ServiceAccount
    name: attacker
    namespace: {{ .Values.attackerNamespace }}
